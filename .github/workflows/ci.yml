name: CI

on:
  pull_request:
  push:

jobs:
  verify-bashutils:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: bash syntax check
        run: bash -n bashutils-template.sh
      - name: run bats tests
        run: bats test
      - name: Verify .bashutils is up to date
        run: |
          ./helper.sh build_bashutils
          git diff --exit-code -- .bashutils
