name: CI

on:
  pull_request:
  push:

jobs:
  verify-bashutils:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: install requirements
        run: |
          ./helper.sh reqs
      - name: call agent
        run: |
          ./helper.sh prompt_copilot_agent
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: bash syntax check
        run: bash -n bashutils-template.sh
      - name: run bats tests
        run: bats test
      - name: Verify .bashutils is up to date
        run: |
          ./helper.sh build_bashutils
          git diff --exit-code -- .bashutils
