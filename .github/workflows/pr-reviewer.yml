name: PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  agent-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PR reviewer agent
        uses: github/copilot-agent-action@v1
        with:
          agent-definition: .github/agents/agent-pr-review.agent.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
