name: PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  agent-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Agent Review
        id: agent-review
        env:
          COPILOT_AGENT_TOKEN: ${{ secrets.COPILOT_AGENT_TOKEN }}
        run: |
          set -euo pipefail
          : "${COPILOT_AGENT_TOKEN:?COPILOT_AGENT_TOKEN secret is required}"
          test -f .github/agents/agent-pr-review.agent.md || { echo "Missing agent definition: .github/agents/agent-pr-review.agent.md"; exit 1; }

          review_prompt="Review the changes in this PR and provide feedback"

          GITHUB_TOKEN="$COPILOT_AGENT_TOKEN" copilot /agent agent-pr-review "$review_prompt" > review_output.md 2> review_error.log || {
            cat review_error.log
            exit 1
          }

          test -s review_output.md || {
            echo "Review output file is empty or could not be read"
            cat review_error.log
            exit 1
          }

      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review_output.md', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
