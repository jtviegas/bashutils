name: PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  agent-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Agent Review
        id: agent-review
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          : "${GITHUB_TOKEN:?GITHUB_TOKEN secret is required}"
          test -f .github/agents/agent-pr-review.agent.md || { echo "Missing agent definition: .github/agents/agent-pr-review.agent.md"; exit 1; }

          review_prompt="Review the changes in this PR and provide feedback"
          stderr_log="$(mktemp)"

          copilot -i "/agent agent-pr-review \"${review_prompt}\"" > review_output.md 2>"${stderr_log}" || {
            rc=$?
            echo "Copilot agent review failed with exit code ${rc}. Captured stderr:"
            if test -s "${stderr_log}"; then
              cat "${stderr_log}"
            else
              echo "(stderr was empty)"
            fi
            if test -s review_output.md; then
              echo "Captured stdout:"
              cat review_output.md
            fi
            rm -f "${stderr_log}"
            exit "${rc}"
          }

          rm -f "${stderr_log}"

          test -s review_output.md || {
            echo "Review output file is empty or unreadable (Copilot command completed but produced no review output)."
            exit 1
          }

      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review_output.md', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
